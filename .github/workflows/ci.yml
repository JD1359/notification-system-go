name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Resolve dependencies (generates go.sum if missing)
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -race -cover

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Resolve dependencies
        run: go mod tidy
      - name: Build API
        run: CGO_ENABLED=0 go build -o bin/api ./cmd/api
      - name: Build Worker
        run: CGO_ENABLED=0 go build -o bin/worker ./cmd/worker
      - name: Docker build
        run: docker build -t notification-system-go:ci .